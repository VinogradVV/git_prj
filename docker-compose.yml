x-airflow-common: &airflow-common
  build:
    context: ./infra/airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR}
    AIRFLOW__AUTH_MANAGER: ${AIRFLOW_AUTH_MANAGER}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DATABASE_SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW_DAGS_ARE_PAUSED_AT_CREATION}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: ${AIRFLOW_SCHEDULER_ENABLE_HEALTH_CHECK}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY}
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_SECRET_KEY}
    AIRFLOW__AUTH_MANAGER__SIMPLE_AUTH_MANAGER__PASSWORD_FILE: '/home/airflow/.airflow/simple_auth_manager_passwords.json'
    AIRFLOW_CONFIG: '/home/airflow/.airflow/airflow.cfg'
    AIRFLOW__CORE__DAGS_FOLDER: '/opt/airflow/dags'
    # Instance name configuration
    AIRFLOW_INSTANCE_NAME: ${AIRFLOW_INSTANCE_NAME:-asapbi-airflow}
    AIRFLOW__CORE__INSTANCE_NAME: ${AIRFLOW__CORE__INSTANCE_NAME:-asapbi-airflow}
    AIRFLOW_INSTANCE_DESCRIPTION: ${AIRFLOW_INSTANCE_DESCRIPTION:-asapBI Airflow Instance}
    AIRFLOW__CORE__INSTANCE_DESCRIPTION: ${AIRFLOW__CORE__INSTANCE_DESCRIPTION:-asapBI Airflow Instance}
    ENVIRONMENT: ${ENVIRONMENT:-development}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    S3_ACCESS_KEY: ${MINIO_ROOT_USER}
    S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
    SPARK_HOME: /opt/spark
    SPARK_JARS_DIR: /opt/spark/jars
    AWS_JAVA_V1_DISABLE_DEPRECATION_ANNOUNCEMENT: "true"
  volumes:
    - ./infra/airflow/config:/opt/airflow/config
    - airflow_dags:/opt/airflow/dags
    - airflow_tmp:/tmp
    - airflow_logs:/opt/airflow/logs
    - ./infra/airflow/plugins:/opt/airflow/plugins
    - ./infra/airflow/processing/spark/jobs:/opt/spark/jobs
    - ./infra/airflow/entrypoint.sh:/opt/airflow/entrypoint.sh:ro
    - .:/workspace:cached
  user: "${AIRFLOW_UID}:0"
  depends_on:
    postgres:
      condition: service_started
services:
  minio:
    build:
      context: ./infra/minio
    command: server /data --console-address ":9001"
    ports:
      - "9003:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles: [core,spark,spark_test]

  hive-metastore:
    build:
      context: ./infra/hive-metastore
    environment:
      - HIVE_METASTORE_DB_TYPE=${HIVE_METASTORE_DB_TYPE}
      - HIVE_METASTORE_DB_HOST=${HIVE_METASTORE_DB_HOST}
      - HIVE_METASTORE_DB_NAME=${HIVE_METASTORE_DB_NAME}
      - HIVE_METASTORE_DB_USER=${HIVE_METASTORE_DB_USER}
      - HIVE_METASTORE_DB_PASS=${HIVE_METASTORE_DB_PASS}
    depends_on:
      - postgres
    ports:
      - "9083:9083"
    healthcheck:
      test: ["CMD", "pidof", "java"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles: [core,spark,spark_test,test]

  trino:
    build:
      context: ./infra/trino
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8095:8095"  # Trino Connection API
    volumes:
      - ./infra/trino/config:/etc/trino
      - trino-data:/var/trino/data
    user: "0:0"
    #depends_on:
      #- hive-metastore
      #- minio
      #- clickhouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - TRINO_INSTANCE_NAME=${TRINO_INSTANCE_NAME:-asapbi-trino}
    profiles: [core, spark_test,test]

  trino-base:
    build:
      context: ./infra/trino
      dockerfile: Dockerfile.base
    image: trino-base:latest
    profiles: [build]  # Собирается отдельно, не запускается

  postgres:
    build:
      context: ./infra/postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_CDC_USER: ${POSTGRES_CDC_USER:-cdc_reader}
      POSTGRES_CDC_PASSWORD: ${POSTGRES_CDC_PASSWORD:-cdc_reader_pwd}
    ports:
      - "5436:5432"  # PostgreSQL порт (изменено с 5433 на 5436)
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init-gitlab.sql:/docker-entrypoint-initdb.d/init-gitlab.sql
      - ./infra/postgres/init_sandbox_db.sql:/docker-entrypoint-initdb.d/init_sandbox_db.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 5s
    profiles: [core,airflow,spark,spark_test,orchestrator,test]

  debezium:
    build:
      context: ./infra/debezium
    environment:
      - BOOTSTRAP_SERVERS=${DEBEZIUM_BOOTSTRAP_SERVERS}
      - GROUP_ID=${DEBEZIUM_GROUP_ID}
      - CONFIG_STORAGE_TOPIC=${DEBEZIUM_CONFIG_STORAGE_TOPIC}
      - OFFSET_STORAGE_TOPIC=${DEBEZIUM_OFFSET_STORAGE_TOPIC}
      - STATUS_STORAGE_TOPIC=${DEBEZIUM_STATUS_STORAGE_TOPIC}
      - POSTGRES_CDC_USER=${POSTGRES_CDC_USER:-cdc_reader}
      - POSTGRES_CDC_PASSWORD=${POSTGRES_CDC_PASSWORD:-cdc_reader_pwd}
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    profiles: [debezium]

  kafka:
    build:
      context: ./infra/kafka
    environment:
      KAFKA_CFG_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_CFG_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES}
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_CFG_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_CFG_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES}
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
        reservations:
          cpus: '0.50'
          memory: 512M
    profiles: [spark,core]

  schema-registry:
    build:
      context: ./infra/schema-registry
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: ${SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS}
      SCHEMA_REGISTRY_HOST_NAME: ${SCHEMA_REGISTRY_HOST_NAME}
      SCHEMA_REGISTRY_LISTENERS: ${SCHEMA_REGISTRY_LISTENERS}
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8084:8081"
    profiles: [core,spark]

  data-generator:
    build:
      context: ./infra/data-generator
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      SCHEMA_REGISTRY_URL: ${SCHEMA_REGISTRY_URL:-http://schema-registry:8084}
      PG_DSN: ${PG_DSN:-host=postgres port=5432 dbname=demo user=admin password=admin}
      RATE_MPS: ${DATA_GEN_RATE_MPS:-40}
      SEED_USERS: ${DATA_GEN_SEED_USERS:-500}
      SEED_PRODUCTS: ${DATA_GEN_SEED_PRODUCTS:-200}
      SEED_WAREHOUSES: ${DATA_GEN_SEED_WAREHOUSES:-5}
      SEED_SUPPLIERS: ${DATA_GEN_SEED_SUPPLIERS:-20}
      P_CUSTOMER_INTERACTION: ${DATA_GEN_P_CUSTOMER_INTERACTION:-0.8}
      P_INVENTORY_EVENT: ${DATA_GEN_P_INVENTORY_EVENT:-0.3}
      TOPIC_ORDERS: ${DATA_GEN_TOPIC_ORDERS:-orders.v1}
      TOPIC_PAYMENTS: ${DATA_GEN_TOPIC_PAYMENTS:-payments.v1}
      TOPIC_SHIPMENTS: ${DATA_GEN_TOPIC_SHIPMENTS:-shipments.v1}
      TOPIC_INVENTORY_CHANGES: ${DATA_GEN_TOPIC_INVENTORY_CHANGES:-inventory-changes.v1}
      TOPIC_CUSTOMER_INTERACTIONS: ${DATA_GEN_TOPIC_CUSTOMER_INTERACTIONS:-customer-interactions.v1}
    #depends_on:
    #  postgres:
    #    condition: service_healthy
    #  kafka:
    #    condition: service_healthy
    #  schema-registry:
    #    condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import psycopg2, os; from confluent_kafka.schema_registry import SchemaRegistryClient; pg_dsn = os.getenv('PG_DSN', 'host=postgres port=5432 dbname=demo user=admin password=admin'); sr_url = os.getenv('SCHEMA_REGISTRY_URL', 'http://schema-registry:8084'); conn = psycopg2.connect(pg_dsn); conn.close(); sr = SchemaRegistryClient({'url': sr_url}); sr.get_subjects(); print('Dependencies healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    profiles: [datagen]


  kafka-ui:
    build:
      context: ./infra/kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_UI_CLUSTERS_0_NAME}
      KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS: ${KAFKA_UI_CLUSTERS_0_BOOTSTRAP_SERVERS}
      KAFKA_CLUSTERS_0_SCHEMA_REGISTRY: ${KAFKA_UI_CLUSTERS_0_SCHEMA_REGISTRY}
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8082:8080"
    profiles: [spark,core]

  # --- SPARK (Master + Worker) ---
  # Объединенный Spark для уменьшения количества контейнеров
  # ЗАКОММЕНТИРОВАНО - используем data-forge-spark-1 с FastAPI
  # spark-master-worker:
  #   build:
  #     context: ./infra/spark
  #     dockerfile: Dockerfile
  #   container_name: data-forge-spark
  #   restart: unless-stopped
  #   ports:
  #     - "7077:7077"  # Master порт
  #     - "8088:8080"  # Web UI
  #     - "4040:4040"  # Driver UI
  #     - "8098:8099"  # Spark Connection API (старый порт)
  #   environment:
  #     - SPARK_MODE=master
  #     - SPARK_MASTER_HOST=spark-master-worker
  #     - SPARK_PUBLIC_DNS=localhost
  #     - AWS_REGION=us-east-1
  #     - AWS_DEFAULT_REGION=us-east-1
  #     - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
  #     - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
  #     - AWS_JAVA_V1_DISABLE_DEPRECATION_ANNOUNCEMENT=true
  #     - SPARK_INSTANCE_NAME=${SPARK_INSTANCE_NAME:-asapbi-spark}
  #   extra_hosts:
  #     - "localhost:host-gateway"
  #   volumes:
  #     - ./infra/airflow/processing/spark/jobs:/opt/spark/jobs
  #     - spark-data:/opt/bitnami/spark/data
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8080"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 60s
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '2.00'
  #         memory: 2048M
  #       reservations:
  #         cpus: '1.00'
  #         memory: 1024M
  #   depends_on:
  #     #minio:
  #     #  condition: service_healthy
  #     hive-metastore:
  #       condition: service_healthy
  #     #kafka:
  #     #  condition: service_healthy
  #   profiles: [spark,test]

  spark-base:
    build:
      context: ./infra/spark
      dockerfile: Dockerfile.base
    image: spark-base:latest
    profiles: [build]  # Собирается отдельно, не запускается

  
  spark:
    build:
      context: ./infra/spark
      dockerfile: Dockerfile
    container_name: data_forge-spark
    environment:
      - SPARK_HOME=/opt/bitnami/spark
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark
      - SPARK_MASTER_PORT=7077
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_MASTER_URL=${SPARK_MASTER_URL}
      - SPARK_MASTER_OPTS=-Dspark.master.rest.enabled=true -Dspark.master.rest.port=6066      
      - SPARK_MASTER_REST_PORT=6066
      - SPARK_CLASSPATH=/opt/spark/libraries/*
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_JAVA_V1_DISABLE_DEPRECATION_ANNOUNCEMENT=true
      - SPARK_INSTANCE_NAME=${SPARK_INSTANCE_NAME:-asapbi-spark}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    ports:
      - "8081:8080"  # Spark Master UI
      - "7077:7077"  # Spark Master port
      - "8099:8099"  # FastAPI Spark SQL API
      - "6066:6066"  # ЭТО ГЛАВНОЕ: открываем доступ для Airflow по REST API
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - ./infra/spark/libraries:/opt/spark/libraries
      - ./infra/airflow/processing/spark/jobs:/opt/spark/jobs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      hive-metastore:
        condition: service_healthy
    networks:
      - default
      - shared_network
    profiles: [spark,test]

  spark-worker:
    image: bitnamilegacy/spark:3.5.6
    container_name: data_forge-spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_WEBUI_PORT=8091
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - SPARK_CLASSPATH=/opt/spark/libraries/*
      - SPARK_EXECUTOR_EXTRA_CLASSPATH=/opt/spark/libraries/*
    ports:
      - "8091:8091"
    depends_on:
      - spark
    volumes:
      - ./infra/spark/libraries:/opt/spark/libraries
      - ./infra/airflow/processing/spark/jobs:/opt/spark/jobs
    networks:
      - default
      - shared_network
    profiles: [spark,test]



  spark-thriftserver:
    build:
      context: ./infra/spark
      dockerfile: Dockerfile
    environment:
      - SPARK_HOME=/opt/bitnami/spark
      - SPARK_MASTER_URL=${SPARK_MASTER_URL}
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_JAVA_V1_DISABLE_DEPRECATION_ANNOUNCEMENT=true
      - SPARK_INSTANCE_NAME=${SPARK_INSTANCE_NAME:-asapbi-spark}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    ports:
      - "10000:10000"
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - ./infra/airflow/processing/spark/jobs:/opt/spark/jobs
    command: >-
      bash -lc
      "shopt -s nullglob
      && mkdir -p $$SPARK_HOME/logs
      && $$SPARK_HOME/sbin/start-thriftserver.sh
      --master $$SPARK_MASTER_URL
      --packages org.postgresql:postgresql:42.7.4,com.clickhouse:clickhouse-jdbc:0.6.3
      --conf spark.sql.catalog.pg=org.apache.spark.sql.execution.datasources.v2.jdbc.JDBCTableCatalog
      --conf spark.sql.catalog.pg.url=jdbc:postgresql://postgres:5432/$$POSTGRES_DB
      --conf spark.sql.catalog.pg.user=$$POSTGRES_USER
      --conf spark.sql.catalog.pg.password=$$POSTGRES_PASSWORD
      --conf spark.sql.catalog.pg.driver=org.postgresql.Driver
      --conf spark.sql.catalog.ch=org.apache.spark.sql.execution.datasources.v2.jdbc.JDBCTableCatalog
      --conf spark.sql.catalog.ch.url=jdbc:clickhouse://clickhouse:8123/$$CLICKHOUSE_DB
      --conf spark.sql.catalog.ch.user=$$CLICKHOUSE_USER
      --conf spark.sql.catalog.ch.password=$$CLICKHOUSE_PASSWORD
      --conf spark.sql.catalog.ch.driver=com.clickhouse.jdbc.ClickHouseDriver
      --hiveconf hive.server2.thrift.bind.host=0.0.0.0
      --hiveconf hive.server2.thrift.port=10000
      --hiveconf hive.server2.authentication=NOSASL
      --hiveconf hive.server2.enable.doAs=false
      && (tail -f $$SPARK_HOME/logs/* 2>/dev/null || true)
      && tail -f /dev/null"
    depends_on:
      spark-master-worker:
        condition: service_healthy
    profiles: [thriftserver]

  redis:
    build:
      context: ./infra/redis
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    profiles: [core]

  clickhouse:
    build:
      context: ./infra/clickhouse
    ports:
      - "8125:8123"  # HTTP порт (изменено с 8124 на 8125)
      - "9006:9000"  # Native порт (изменено с 9003 на 9006)
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./infra/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./infra/clickhouse/users.xml:/etc/clickhouse-server/users.xml
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    privileged: true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles: [core,clickhouse,spark_test,test]

  greenplum:
    build:
      context: ./infra/greenplum
      dockerfile: Dockerfile.simple
    container_name: gpdb72
    hostname: localhost
    ports:
      - "5435:5432"  # Greenplum порт
      - "28088:28080"  # Greenplum порт для веб-интерфейса
    environment:
      - GPHOME=/opt/greenplum-db
      - PGPORT=5432
      - PGUSER=gpadmin
      - PGDATABASE=gpadmin
      - MASTER_DATA_DIRECTORY=/data/gpdb/coordinator
      - GREENPLUM_USER=gpadmin
      - GREENPLUM_PASSWORD=gpadmin
      - GREENPLUM_DB=gpadmin
      - GREENPLUM_HOST=greenplum
      - GREENPLUM_PORT=5432
    user: root
    volumes:
      - ./data/greenplum:/data/gpdb:rw
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    privileged: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "gpadmin"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    profiles: [full]

  airflow-base:
    build:
      context: ./infra/airflow
      dockerfile: Dockerfile.base
    image: airflow-base:latest
    profiles: [build]  # Собирается отдельно, не запускается

  airflow:
    <<: *airflow-common
    entrypoint: ["/bin/bash", "/opt/airflow/entrypoint.sh"]
    environment:
      # Override user creation variables
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"      
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-airflow}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-airflow}
      AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME:-Airflow}
      AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME:-Admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-airflow@airflow.com}
      # Override instance name variables
      AIRFLOW_INSTANCE_NAME: ${AIRFLOW_INSTANCE_NAME:-asapbi-airflow}
      AIRFLOW__CORE__INSTANCE_NAME: ${AIRFLOW__CORE__INSTANCE_NAME:-asapbi-airflow}
      AIRFLOW_INSTANCE_DESCRIPTION: ${AIRFLOW_INSTANCE_DESCRIPTION:-asapBI Airflow Instance}
      AIRFLOW__CORE__INSTANCE_DESCRIPTION: ${AIRFLOW__CORE__INSTANCE_DESCRIPTION:-asapBI Airflow Instance}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8085:8080"
      - "8086:8081"  # DTP Metadata API
      - "8083:8082"  # DTP Deploy API
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8793/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [airflow, core, spark_test,orchestrator,test]

  superset:
    build:
      context: ./infra/superset
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - SUPERSET_ADMIN_USERNAME=${SUPERSET_ADMIN_USERNAME}
      - SUPERSET_ADMIN_PASSWORD=${SUPERSET_ADMIN_PASSWORD}
      - SUPERSET_ADMIN_FIRSTNAME=${SUPERSET_ADMIN_FIRSTNAME}
      - SUPERSET_ADMIN_LASTNAME=${SUPERSET_ADMIN_LASTNAME}
      - SUPERSET_ADMIN_EMAIL=${SUPERSET_ADMIN_EMAIL}
    entrypoint: ["/app/pythonpath/create_admin.sh"]
    ports:
      - "8089:8088"
    volumes:
      - ./infra/superset/provisioning:/app/provisioning
      - ./infra/superset/create_admin.sh:/app/pythonpath/create_admin.sh
    depends_on:
      - trino
    profiles: [superset]

  jupyterlab:
    build:
      context: ./infra/jupyterlab
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./spark-jobs:/home/jovyan/spark-jobs
    environment:
      - JUPYTER_ENABLE_LAB=${JUPYTER_ENABLE_LAB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8084
      - SPARK_MASTER_URL=${SPARK_MASTER_URL}
      - TRINO_URL=http://trino:8080
      - SUPERSET_URL=http://superset:8088
      - AIRFLOW_URL=http://airflow-apiserver:8080
    profiles: [explore]

  gitlab:
    image: gitlab/gitlab-ee:latest
    container_name: gitlab
    hostname: gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab.localhost'
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
        gitlab_rails['initial_root_password'] = 'SecureGitLab123!'
        gitlab_rails['gitlab_email_display_name'] = 'asapBI'
        gitlab_rails['gitlab_email_reply_to'] = 'gitlab@asapbi.local'
        gitlab_rails['gitlab_default_projects_limit'] = 100
        gitlab_rails['gitlab_default_can_create_group'] = true
        gitlab_rails['gitlab_default_theme'] = 2
        # Disable email validation for development
        gitlab_rails['gitlab_email_confirmation_signin'] = false
        gitlab_rails['gitlab_email_domain_whitelist'] = %w[example.com asapbi.dev localhost.localdomain gmail.com]
        gitlab_rails['gitlab_email_domain_denylist'] = []
        # Disable compromised password check for development
        gitlab_rails['password_authentication_enabled_for_gitlab_client'] = true
        gitlab_rails['password_authentication_enabled_for_web'] = true
        # Database configuration
        postgresql['enable'] = false
        gitlab_rails['db_adapter'] = 'postgresql'
        gitlab_rails['db_encoding'] = 'utf8'
        gitlab_rails['db_host'] = 'postgres'
        gitlab_rails['db_port'] = 5432
        gitlab_rails['db_username'] = 'gitlab'
        gitlab_rails['db_password'] = 'gitlab_password'
        gitlab_rails['db_database'] = 'gitlabhq_production'
        # Redis configuration
        redis['enable'] = false
        gitlab_rails['redis_host'] = 'redis'
        gitlab_rails['redis_port'] = 6379
        # Disable unnecessary services
        prometheus_monitoring['enable'] = false
        node_exporter['enable'] = false
        redis_exporter['enable'] = false
        postgres_exporter['enable'] = false
        gitlab_exporter['enable'] = false
    ports:
      - "3001:80"      # GitLab Web UI
      - "2222:22"      # GitLab SSH
      - "4433:443"     # HTTPS (если понадобится)
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
      - ./infra/gitlab/create-admin.sh:/scripts/create-admin.sh
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s  # GitLab требует времени для запуска
    profiles: [gitlab]

  gitlab-admin-setup:
    image: gitlab/gitlab-ee:latest
    container_name: gitlab-admin-setup
    depends_on:
      gitlab:
        condition: service_healthy
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-data:/var/opt/gitlab
      - ./infra/gitlab/create-admin.sh:/scripts/create-admin.sh
    entrypoint: ["/bin/bash", "/scripts/create-admin.sh"]
    restart: "no"
    profiles: [gitlab]

  dagster-base:
    build:
      context: ./infra/dagster
      dockerfile: Dockerfile.base
    image: dagster-base:latest
    profiles: [build]  # Собирается отдельно, не запускается

  dagster:
    build:
      context: ./infra/dagster
      dockerfile: Dockerfile
    image: dagster:latest
    container_name: data-forge-dagster
    restart: unless-stopped
    ports:
      - "3000:3000"  # Dagster Web UI
      - "8087:8087"  # API Server
      - "8096:8096"  # DTP GitLab API
      - "8097:8097"  # Repository Manager API
      - "8093:8093"  # Template API
      - "8094:8094"  # Code Execution API
      - "8090:8090"  # Connection Management API
      - "8098:8098"  # DTP Metadata API
      - "8100:8100"  # DTP Deploy API
    environment:
      - DAGSTER_POSTGRES_HOST=postgres
      - DAGSTER_POSTGRES_PORT=5432
      - DAGSTER_POSTGRES_USER=admin
      - DAGSTER_POSTGRES_PASSWORD=admin
      - DAGSTER_POSTGRES_DB=dagster
      - DAGSTER_API_HOST=0.0.0.0
      - DAGSTER_API_PORT=8087
      - DAGSTER_HOME=/opt/dagster/temp
      - DAGSTER_CURRENT_USER=admin
      - DAGSTER_DEPLOYMENT_NAME=asapbi-dagster
      - DAGSTER_ENVIRONMENT=development
      # Spark environment variables (like Airflow)
      - SPARK_HOME=/opt/spark
      - SPARK_JARS_DIR=/opt/spark/jars
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
      - AWS_JAVA_V1_DISABLE_DEPRECATION_ANNOUNCEMENT=true
      # Database connections
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=demo
      - POSTGRES_HOST=postgres
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=admin
      - CLICKHOUSE_DB=analytics
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - TRINO_USER=admin
      - TRINO_CATALOG=hive
      - TRINO_SCHEMA=default
      - TRINO_HOST=trino
      - TRINO_PORT=8080
      - SPARK_MASTER_URL=spark://spark:7077
      - GREENPLUM_USER=gpadmin
      - GREENPLUM_PASSWORD=gpadmin
      - GREENPLUM_DB=gpadmin
      - GREENPLUM_HOST=greenplum
      - GREENPLUM_PORT=5432
      - GITLAB_URL=http://gitlab:80
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      - GITLAB_USERNAME=${GITLAB_USERNAME:-root}
      - GITLAB_PASSWORD=${GITLAB_PASSWORD:-password123}
      - GITLAB_ORG=asapbi
      - GITLAB_REPO=dtp-definitions
    volumes:
      - ./infra/dagster:/opt/dagster/app
      - ./scripts:/opt/dagster/scripts
      - dtp_jobs:/opt/dagster/dtp_jobs
      - ./infra/dagster/spark/jobs:/opt/spark/jobs  # Dagster Spark jobs volume
      - dagster_workspace:/opt/dagster/workspace
      - dagster_temp:/opt/dagster/temp
    depends_on:
      postgres:
        condition: service_started
    profiles: [core,orchestrator,test]
    command: >
      bash -c "
        echo 'Waiting for services to be ready...' &&
        sleep 10 &&
        echo 'Initializing dtp_jobs volume...' &&
        cp -r /opt/dagster/app/dtp_jobs/* /opt/dagster/dtp_jobs/ 2>/dev/null || true &&
        chmod -R 777 /opt/dagster/dtp_jobs/ &&
        echo 'Fixing permissions for dtp_jobs directory...' &&
        echo 'Skipping DTP example initialization (GitLab not available)...' &&
        echo 'Starting Dagster API Server...' &&
        nohup python /opt/dagster/api_server.py > /tmp/api_server.log 2>&1 &
        sleep 2 &&
        echo 'Starting Repository Manager API...' &&
        python /opt/dagster/repo_manager_api.py &
        echo 'Starting DTP GitLab API...' &&
        python /opt/dagster/dtp_git_api.py &
        echo 'Starting Template API...' &&
        python /opt/dagster/template_api.py &
        echo 'Starting Code Execution API...' &&
        python /opt/dagster/code_execution_api.py &
        echo 'Starting Connection Management API...' &&
        python /opt/dagster/connection_management_api.py &
        echo 'Starting Connection Manager API...' &&
        python /opt/dagster/connection_manager_api.py &
        echo 'Starting DTP Metadata API...' &&
        python /opt/dagster/dtp_metadata_api_server.py &
        echo 'Starting DTP Deploy API...' &&
        python /opt/dagster/dtp_deploy_api.py --port 8100 &
        echo 'All services started. Waiting for initialization...' &&
        sleep 30 &&
        echo 'All services ready. Checking health...' &&
        python /opt/dagster/health_check.py &&
        echo 'Setting up Dagster environment...' &&
        echo 'storage:' > /tmp/dagster.yaml &&
        echo '  postgres:' >> /tmp/dagster.yaml &&
        echo '    postgres_db:' >> /tmp/dagster.yaml &&
        echo '      username: admin' >> /tmp/dagster.yaml &&
        echo '      password: admin' >> /tmp/dagster.yaml &&
        echo '      hostname: postgres' >> /tmp/dagster.yaml &&
        echo '      db_name: dagster' >> /tmp/dagster.yaml &&
        echo '      port: 5432' >> /tmp/dagster.yaml &&
        export DAGSTER_HOME=/tmp &&
        echo 'Creating dagster database...' &&
        python3 /opt/dagster/create_dagster_db.py &&
        echo 'Starting Dagster Web Server...' &&
        cd /opt/dagster &&
        dagster dev -h 0.0.0.0 -p 3000 -w workspace.yaml
      "

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/databases"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- ВЫЧИСЛЕНИЯ (Spark + DataFusion/Comet) ---
  # Spark с плагином DataFusion Comet для Rust-производительности
  spark-comet:
    build:
      context: ./infra/spark-comet
    image: spark-comet:3.5.6
    container_name: data-forge-spark-comet
    restart: unless-stopped
    ports:
      - "50051:15002"  # Spark Connect порт
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - spark-comet-data:/opt/bitnami/spark/data
    depends_on:
      #- minio
      - postgres
    command: ["/opt/bitnami/spark/sbin/start-connect-server.sh", "--conf", "spark.driver.extraJavaOptions=-Dcomet.log.level=info"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15002"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    profiles: [spark, spark_test]

  ai-gateway:
    build:
      context: ./infra/ai-gateway
      dockerfile: Dockerfile
    ports:
      - "9009:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=8000
    networks:
      - default
      - shared_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  
volumes:
  minio-data:
  pg-data:
  kafka-data:
  trino-data:
  clickhouse-data:
  spark-data:
  spark-comet-data:
  gitlab-config:
  gitlab-logs:
  gitlab-data:
  gitlab-uploads:
  gitlab-shared:
  dagster_workspace:
  dagster_temp:
  dtp_jobs:
  kyuubi-logs:
  greenplum-data:
  airflow_tmp:
  airflow_dags:
  airflow_logs:
  gp_vol:

networks:
  default:
    driver: bridge
  shared_network:
    driver: bridge
